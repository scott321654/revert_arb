{% extends "base.html" %}
{% block title %}調整名單 — 台灣50尾盤套利{% endblock %}
{% block content %}
<h5 class="mb-3">✏️ 輸入本次調整名單</h5>

<div class="row g-3">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">季度</label>
            <input class="form-control" name="quarter" placeholder="2026Q3" value="{{ adj.data.quarter }}">
          </div>
          <div class="mb-3">
            <label class="form-label">被剔除的股票代號（逗號分隔）</label>
            <input class="form-control" name="removed" placeholder="1301,2002" value="{{ ','.join(adj.data.removed) }}">
          </div>
          <div class="mb-3">
            <label class="form-label">新納入的股票代號（逗號分隔）</label>
            <input class="form-control" name="added" placeholder="3037,3665" value="{{ ','.join(adj.data.added) }}">
          </div>
          <div class="mb-3">
            <label class="form-label">權重調降（選填）</label>
            <input class="form-control" name="reweight" placeholder="2330,2317" value="{{ ','.join(adj.data.reweight) }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">儲存</button>
            <button type="button" class="btn btn-outline-danger" onclick="clearForm()">清除</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h6>台灣50 成分股 <small class="text-muted" id="targetHint">（點選加入 → 剔除）</small></h6>
        <div style="max-height:400px;overflow-y:auto">
          <table class="table table-sm table-hover">
            {% for code, name in stocks %}
            <tr style="cursor:pointer" onclick="addToActive('{{ code }}')">
              <td class="text-muted" style="width:60px">{{ code }}</td>
              <td>{{ name }}</td>
            </tr>
            {% endfor %}
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const FIELD_NAMES = { removed: '剔除', added: '納入', reweight: '調降' };

function getActiveField() {
  const el = document.activeElement;
  const name = el && el.name;
  if (name === 'removed' || name === 'added' || name === 'reweight') return name;
  return 'removed';
}

function addToActive(code) {
  const field = getActiveField();
  const input = document.querySelector(`input[name="${field}"]`);
  const vals = input.value.split(',').map(s => s.trim()).filter(Boolean);
  if (!vals.includes(code)) {
    vals.push(code);
    input.value = vals.join(',');
  }
  input.focus();
}

document.addEventListener('focus', function(e) {
  const name = e.target && e.target.name;
  if (name === 'removed' || name === 'added' || name === 'reweight') {
    document.getElementById('targetHint').textContent = `（點選加入 → ${FIELD_NAMES[name]}）`;
  }
}, true);

function clearForm() {
  document.querySelectorAll('input[name="quarter"], input[name="removed"], input[name="added"], input[name="reweight"]').forEach(el => el.value = '');
}
</script>
{% endblock %}
