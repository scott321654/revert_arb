<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TW50套利">
  <meta name="theme-color" content="#2c3e50">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <title>{% block title %}台灣50尾盤套利{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --sidebar-width: 220px; }
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #f5f6fa; font-size: 16px; }
    .wrapper { display: flex; }
    .sidebar { background: #2c3e50; color: #ecf0f1; width: var(--sidebar-width); min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 1000; transition: transform .3s; }
    .sidebar .logo { padding: 20px 16px; font-size: 1.1rem; font-weight: 700; border-bottom: 1px solid #34495e; }
    .sidebar .nav-link { color: #bdc3c7; padding: 12px 20px; border-radius: 6px; margin: 2px 8px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #34495e; color: #fff; }
    .main { margin-left: var(--sidebar-width); flex: 1; padding: 24px 32px; min-height: 100vh; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 999; }
    .card { border: none; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 16px; }
    .stat-card { text-align: center; padding: 20px; }
    .stat-card .number { font-size: 2rem; font-weight: 700; }
    .stat-card .label { color: #7f8c8d; font-size: .85rem; }
    .signal-pass { color: #27ae60; font-weight: 700; }
    .signal-fail { color: #e74c3c; font-weight: 700; }
    .zscore-high { color: #27ae60; }
    .zscore-low { color: #e74c3c; }
    .monitor-log { background: #1a1a2e; color: #00ff88; font-family: monospace; font-size: .85rem; padding: 12px; border-radius: 8px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
    .navbar-mobile { display: none; background: #2c3e50; padding: 8px 16px; position: sticky; top: 0; z-index: 900; }
    .navbar-mobile .brand { color: #fff; font-weight: 700; font-size: 1.1rem; }
    .navbar-mobile .btn-menu { background: none; border: none; color: #fff; font-size: 1.5rem; padding: 4px 8px; }
    .table-card-view { display: none; }
    @media (max-width: 767px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.show { display: block; }
      .main { margin-left: 0; padding: 16px; }
      .navbar-mobile { display: flex; align-items: center; justify-content: space-between; }
      .stat-card .number { font-size: 1.5rem; }
      .table-desktop { display: none; }
      .table-card-view { display: block; }
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <nav class="navbar-mobile">
    <button class="btn-menu" onclick="toggleSidebar()">☰</button>
    <span class="brand">📊 TW50 套利</span>
    <span></span>
  </nav>

  <div class="wrapper">
    <aside class="sidebar" id="sidebar">
      <div class="logo">📊 TW50 套利</div>
      <nav class="nav flex-column mt-2">
        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/" onclick="closeSidebar()">儀表板</a>
        <a class="nav-link {% if request.path == '/schedule' %}active{% endif %}" href="/schedule" onclick="closeSidebar()">時程</a>
        <a class="nav-link {% if request.path == '/adjust' %}active{% endif %}" href="/adjust" onclick="closeSidebar()">調整名單</a>
        <a class="nav-link {% if request.path == '/monitor' %}active{% endif %}" href="/monitor" onclick="closeSidebar()">監控</a>
        <a class="nav-link {% if request.path == '/check' %}active{% endif %}" href="/check" onclick="closeSidebar()">手動檢查</a>
        <a class="nav-link {% if request.path == '/positions' %}active{% endif %}" href="/positions" onclick="closeSidebar()">持倉</a>
        <a class="nav-link {% if request.path == '/exit' %}active{% endif %}" href="/exit" onclick="closeSidebar()">平倉</a>
        <a class="nav-link {% if request.path == '/summary' %}active{% endif %}" href="/summary" onclick="closeSidebar()">績效</a>
      </nav>
    </aside>
    <main class="main">
      {% for cat, msg in get_flashed_messages(with_categories=true) %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show py-2">{{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
      {% endfor %}
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('show');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    }
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/sw.js');
      });
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
